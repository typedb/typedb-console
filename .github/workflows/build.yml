name: Build & checkstyle

# Always runs on every PR and push: the workspace-wide build, checkstyle, and rustfmt are
# universal correctness checks. Per-binary assembly tests live in test-console.yml /
# test-loader.yml, which use built-in `paths` filters to skip irrelevant runs.
on:
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & checkstyle
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        run: |
          git init
          git fetch "https://github.com/${GITHUB_REPOSITORY}.git" ${GITHUB_SHA}
          git checkout ${GITHUB_SHA}
          git config --global --add safe.directory $(pwd)
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          google-credentials: ${{ secrets.BAZEL_CACHE_CREDENTIAL_JSON }}
          bazelrc: |
            build --remote_cache https://storage.googleapis.com/typedb-engineers-bazel-remote-cache-europe-west1
      - name: Build everything
        env:
          CARGO_BAZEL_GENERATOR_URL: https://repo.typedb.com/public/public-tools/raw/versions/0.0.0/cargo-bazel-linux-x86_64
        run: bazel build //...
      - name: Checkstyle
        run: |
          bazel run @typedb_dependencies//tool/checkstyle:test-coverage
          bazel test $(bazel query 'kind(checkstyle_test, //...)') --test_output=errors
      - name: rustfmt
        run: bazel test $(bazel query 'kind(rustfmt_test, //...)') --@rules_rust//:rustfmt.toml=//:rustfmt_config --test_output=errors
