name: Console release

# Manual dispatch only. The version is whatever is in ./VERSION at the time the workflow is run.
# Bump VERSION + update RELEASE_NOTES_LATEST.md before triggering this workflow.
on:
  workflow_dispatch:

permissions:
  contents: write

# Console release tags use a `console-` prefix so the Loader release (which shares the VERSION
# file) can produce a parallel `loader-{version}` tag without colliding.
env:
  RELEASE_TAG_PREFIX: console-

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Validate dependencies
        env:
          ARTIFACT_USERNAME: ${{ secrets.REPO_TYPEDB_USERNAME }}
          ARTIFACT_PASSWORD: ${{ secrets.REPO_TYPEDB_PASSWORD }}
        run: |
          bazel run @typedb_dependencies//distribution/artifact:create-netrc
          bazel test //:release-validate-deps --test_output=streamed
      - name: Validate release notes
        env:
          NOTES_VALIDATE_TOKEN: ${{ secrets.REPO_GITHUB_TOKEN }}
        run: bazel run @typedb_dependencies//tool/release/notes:validate --test_output=streamed -- ${{ github.repository_owner }} ${{ github.event.repository.name }} ./RELEASE_NOTES_LATEST.md

  deploy-artifacts:
    name: Deploy ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        target:
          - { label: linux-x86_64, runner: ubuntu-22.04, bazel: "//console:deploy-linux-x86_64-targz" }
          - { label: linux-arm64, runner: ubuntu-22.04-arm, bazel: "//console:deploy-linux-arm64-targz" }
          - { label: mac-x86_64, runner: macos-26-intel, bazel: "//console:deploy-mac-x86_64-zip" }
          - { label: mac-arm64, runner: macos-26, bazel: "//console:deploy-mac-arm64-zip" }
          - { label: windows-x86_64, runner: windows-2022, bazel: "//console:deploy-windows-x86_64-zip" }
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Deploy release artifact to Cloudsmith
        shell: bash
        env:
          DEPLOY_ARTIFACT_USERNAME: ${{ secrets.REPO_TYPEDB_USERNAME }}
          DEPLOY_ARTIFACT_PASSWORD: ${{ secrets.REPO_TYPEDB_PASSWORD }}
        run: |
          bazel run --define version=$(cat VERSION) \
            --compilation_mode=opt \
            ${{ matrix.target.bazel }} -- release

  deploy-github:
    name: Publish GitHub release
    runs-on: ubuntu-22.04
    needs: deploy-artifacts
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.REPO_GITHUB_TOKEN }}
        run: |
          tag="${RELEASE_TAG_PREFIX}${{ steps.version.outputs.version }}"
          # Replace any pre-existing release/tag at the same point so re-runs are idempotent.
          gh release delete "$tag" --yes --cleanup-tag || true
          gh release create "$tag" \
            --target "${{ github.sha }}" \
            --title "TypeDB Console ${{ steps.version.outputs.version }}" \
            --notes-file ./RELEASE_NOTES_LATEST.md

  sync-dependencies:
    name: Sync dependencies
    runs-on: ubuntu-22.04
    needs: deploy-github
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Notify downstream repos
        env:
          SYNC_DEPENDENCIES_TOKEN: ${{ secrets.REPO_GITHUB_TOKEN }}
        run: bazel run @typedb_dependencies//tool/sync:dependencies -- --source ${{ github.event.repository.name }}@$(cat VERSION)
