name: Console tests

# `paths` here narrows PR triggers to changes that could affect the Console binary or its tests.
# Pushes to development/master use the unfiltered branch trigger so we always validate on
# integration regardless of what the patch touched.
on:
  push:
    branches: [development, master]
  pull_request:
    paths:
      - 'console/**'
      - 'tool/connect/**'
      - 'tool/runner/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'MODULE.bazel'
      - 'MODULE.bazel.lock'
      - 'WORKSPACE'
      - 'BUILD'
      - 'deployment.bzl'
      - '.bazelversion'
      - '.github/workflows/test-console.yml'

permissions:
  contents: read

jobs:
  test:
    name: Console assembly tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
      - name: Configure bazel remote cache
        env:
          ARTIFACT_USERNAME: ${{ secrets.REPO_TYPEDB_USERNAME }}
          ARTIFACT_PASSWORD: ${{ secrets.REPO_TYPEDB_PASSWORD }}
        run: |
          bazel run @typedb_dependencies//tool/bazelinstall:remote_cache_setup.sh
          bazel run @typedb_dependencies//distribution/artifact:create-netrc
      - run: bazel test //console/tests/assembly:test-assembly --test_output=streamed
      - run: bazel test //console/tests/assembly:test-script --test_output=streamed
