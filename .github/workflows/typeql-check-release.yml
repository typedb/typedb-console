name: TypeQL Check release

# Manual dispatch only. The version is whatever is in ./VERSION at the time the workflow is run.
# Bump VERSION + update RELEASE_NOTES_LATEST.md before triggering this workflow.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# TypeQL Check release tags use a `typeql-check-` prefix so the Console and Loader releases (which
# share the VERSION file) can produce parallel `console-{version}` / `loader-{version}` tags
# without colliding.
env:
  RELEASE_TAG_PREFIX: typeql-check-

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 -b "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" "https://github.com/${GITHUB_REPOSITORY}.git" .
          git config --global --add safe.directory $(pwd)
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          google-credentials: ${{ secrets.BAZEL_CACHE_CREDENTIAL_JSON }}
          bazelrc: |
            build --remote_cache ${{ vars.BAZEL_CACHE_URL }}
      - name: Validate dependencies
        env:
          ARTIFACT_USERNAME: ${{ vars.REPO_TYPEDB_USERNAME }}
          ARTIFACT_PASSWORD: ${{ secrets.REPO_TYPEDB_PASSWORD }}
        run: |
          bazel run @typedb_dependencies//distribution/artifact:create-netrc
          bazel test //:release-validate-deps --test_output=streamed
      - name: Validate release notes
        env:
          NOTES_VALIDATE_TOKEN: ${{ secrets.REPO_GITHUB_TOKEN }}
        run: bazel run @typedb_dependencies//tool/release/notes:validate --test_output=streamed -- ${{ github.repository_owner }} ${{ github.event.repository.name }} ./RELEASE_NOTES_LATEST.md ${RELEASE_TAG_PREFIX}

  deploy-artifacts:
    name: Deploy ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.runner }}
    container: ${{ matrix.target.container }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        target:
          - { label: linux-x86_64, runner: ubuntu-22.04, container: "typedb/amazonlinux2-ci:3.12.0", bazel: "//typeql-check:deploy-linux-x86_64-targz" }
          - { label: linux-arm64, runner: ubuntu-22.04-arm, container: "typedb/amazonlinux2-ci:3.12.0", bazel: "//typeql-check:deploy-linux-arm64-targz" }
          - { label: mac-x86_64, runner: macos-26-intel, container: null, bazel: "//typeql-check:deploy-mac-x86_64-zip" }
          - { label: mac-arm64, runner: macos-26, container: null, bazel: "//typeql-check:deploy-mac-arm64-zip" }
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 -b "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" "https://github.com/${GITHUB_REPOSITORY}.git" .
          git config --global --add safe.directory $(pwd)
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          google-credentials: ${{ secrets.BAZEL_CACHE_CREDENTIAL_JSON }}
          bazelrc: |
            build --remote_cache ${{ vars.BAZEL_CACHE_URL }}
      - name: Deploy release artifact to Cloudsmith
        shell: bash
        env:
          DEPLOY_ARTIFACT_USERNAME: ${{ vars.REPO_TYPEDB_USERNAME }}
          DEPLOY_ARTIFACT_PASSWORD: ${{ secrets.REPO_TYPEDB_PASSWORD }}
        run: |
          bazel run --define version=$(cat VERSION) \
            --compilation_mode=opt \
            ${{ matrix.target.bazel }} -- release
      # The brew formula pins the sha256 of each mac zip. The deploy step above already built the
      # assemble target, so checksum the resulting zip and hand it off to the deploy-brew job.
      - name: Checksum mac artifact for brew
        if: startsWith(matrix.target.label, 'mac')
        shell: bash
        run: |
          shasum -a 256 bazel-bin/typeql-check/typeql-check-${{ matrix.target.label }}.zip \
            | awk '{print $1}' > "checksum-${{ matrix.target.label }}"
      - name: Upload mac checksum
        if: startsWith(matrix.target.label, 'mac')
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.target.label }}
          path: checksum-${{ matrix.target.label }}

  # Publishes the .deb packages to the shared Cloudsmith apt repo. Each architecture is built
  # natively on its matching runner.
  deploy-apt:
    name: Deploy apt ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        target:
          - { label: linux-x86_64, runner: ubuntu-22.04, bazel: "//typeql-check:deploy-apt-x86_64" }
          - { label: linux-arm64, runner: ubuntu-22.04-arm, bazel: "//typeql-check:deploy-apt-arm64" }
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          google-credentials: ${{ secrets.BAZEL_CACHE_CREDENTIAL_JSON }}
          bazelrc: |
            build --remote_cache ${{ vars.BAZEL_CACHE_URL }}
      - name: Deploy apt package to Cloudsmith
        shell: bash
        env:
          DEPLOY_APT_USERNAME: ${{ vars.REPO_TYPEDB_USERNAME }}
          DEPLOY_APT_PASSWORD: ${{ secrets.REPO_TYPEDB_PASSWORD }}
        run: |
          bazel run --define version=$(cat VERSION) \
            --compilation_mode=opt \
            ${{ matrix.target.bazel }} -- release

  # Publishes the typeql-check formula to the shared typedb/homebrew-tap. Needs the mac zip
  # checksums produced by deploy-artifacts.
  deploy-brew:
    name: Deploy brew
    runs-on: ubuntu-22.04
    needs: deploy-artifacts
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          google-credentials: ${{ secrets.BAZEL_CACHE_CREDENTIAL_JSON }}
          bazelrc: |
            build --remote_cache ${{ vars.BAZEL_CACHE_URL }}
      - name: Download mac checksums
        uses: actions/download-artifact@v4
        with:
          pattern: checksum-mac-*
          path: checksums
          merge-multiple: true
      - name: Deploy brew formula
        shell: bash
        env:
          DEPLOY_BREW_TOKEN: ${{ secrets.REPO_GITHUB_TOKEN }}
          DEPLOY_BREW_USERNAME: ${{ vars.REPO_GITHUB_USERNAME }}
          DEPLOY_BREW_EMAIL: ${{ vars.REPO_GITHUB_EMAIL }}
        run: |
          # deploy_brew reads the sha256 from these files via the checksum-mac-* label flags.
          cp checksums/checksum-mac-arm64 typeql-check/checksum-arm64
          cp checksums/checksum-mac-x86_64 typeql-check/checksum-x86_64
          bazel run --define version=$(cat VERSION) //typeql-check:deploy-brew \
            --//typeql-check:checksum-mac-arm64=//typeql-check:checksum-arm64 \
            --//typeql-check:checksum-mac-x86_64=//typeql-check:checksum-x86_64 \
            --compilation_mode=opt -- release

  # Windows uses the custom batch-script process (see .github/windows): it shortens the Bazel
  # workspace path, installs build dependencies via Chocolatey, and patches the binary to a `.exe`
  # so the GitHub-hosted runner can build and launch it.
  deploy-windows:
    name: Deploy windows-x86_64
    runs-on: windows-2022
    needs: validate
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 -b "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" "https://github.com/${GITHUB_REPOSITORY}.git" .
          git config --global --add safe.directory $(pwd)
      - name: Prepare Windows build environment
        shell: cmd
        run: .github\windows\prepare.bat
      - name: Deploy release artifact to Cloudsmith
        shell: cmd
        env:
          REPO_TYPEDB_USERNAME: ${{ vars.REPO_TYPEDB_USERNAME }}
          REPO_TYPEDB_PASSWORD: ${{ secrets.REPO_TYPEDB_PASSWORD }}
        run: .github\windows\deploy_release.bat typeql-check

  deploy-github:
    name: Publish GitHub release
    runs-on: ubuntu-22.04
    needs: [deploy-artifacts, deploy-windows]
    steps:
      - name: Checkout
        run: |
          git clone --depth 1 -b "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" "https://github.com/${GITHUB_REPOSITORY}.git" .
          git config --global --add safe.directory $(pwd)
      - name: Resolve version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.REPO_GITHUB_TOKEN }}
        run: |
          tag="${RELEASE_TAG_PREFIX}${{ steps.version.outputs.version }}"
          gh release delete "$tag" --yes --cleanup-tag || true
          gh release create "$tag" \
            --target "${{ github.sha }}" \
            --title "TypeQL Check ${{ steps.version.outputs.version }}" \
            --notes-file ./RELEASE_NOTES_LATEST.md
